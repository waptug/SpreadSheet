<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Spreadsheet</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand">Spreadsheet</div>
        <label class="sr-only" for="addressBox">Cell address</label>
        <input id="addressBox" class="address-box" value="A1" autocomplete="off" spellcheck="false">
        <label class="sr-only" for="formulaBar">Formula bar</label>
        <input id="formulaBar" class="formula-bar" autocomplete="off" spellcheck="false">
        <div class="toolbar" aria-label="Spreadsheet tools">
          <nav class="menu-bar" aria-label="Application and function menus">
            <details class="menu">
              <summary>File</summary>
              <div class="menu-list file-menu-list" role="menu">
                <button type="button" role="menuitem" id="newSheet">New Sheet</button>
                <button type="button" role="menuitem" id="saveSheet">Save</button>
                <button type="button" role="menuitem" id="saveSheetAs">Save As...</button>
                <div class="menu-separator" aria-hidden="true"></div>
                <label class="menu-field" for="savedSheetSelect">Saved Sheets</label>
                <select id="savedSheetSelect" class="menu-select"></select>
                <button type="button" role="menuitem" id="loadSheet">Load Selected</button>
                <button type="button" role="menuitem" id="deleteSavedSheet" class="danger">Delete Selected</button>
              </div>
            </details>
            <details class="menu">
              <summary>Math</summary>
              <div class="menu-list" role="menu">
                <button type="button" role="menuitem" data-insert-function="SUM" data-function-template="SUM({range})">SUM</button>
                <button type="button" role="menuitem" data-insert-function="AVG" data-function-template="AVG({range})">AVG</button>
                <button type="button" role="menuitem" data-insert-function="MIN" data-function-template="MIN({range})">MIN</button>
                <button type="button" role="menuitem" data-insert-function="MAX" data-function-template="MAX({range})">MAX</button>
                <button type="button" role="menuitem" data-insert-function="COUNT" data-function-template="COUNT({range})">COUNT</button>
              </div>
            </details>
            <details class="menu">
              <summary>Text</summary>
              <div class="menu-list" role="menu">
                <button type="button" role="menuitem" data-insert-function="CONCAT" data-function-template="CONCAT({range})">CONCAT</button>
                <button type="button" role="menuitem" data-insert-function="LEN" data-function-template="LEN({cell})">LEN</button>
                <button type="button" role="menuitem" data-insert-function="LEFT" data-function-template="LEFT({cell}, 1)">LEFT</button>
                <button type="button" role="menuitem" data-insert-function="RIGHT" data-function-template="RIGHT({cell}, 1)">RIGHT</button>
                <button type="button" role="menuitem" data-insert-function="MID" data-function-template="MID({cell}, 1, 1)">MID</button>
                <button type="button" role="menuitem" data-insert-function="UPPER" data-function-template="UPPER({cell})">UPPER</button>
                <button type="button" role="menuitem" data-insert-function="LOWER" data-function-template="LOWER({cell})">LOWER</button>
                <button type="button" role="menuitem" data-insert-function="TRIM" data-function-template="TRIM({cell})">TRIM</button>
                <button type="button" role="menuitem" data-insert-function="FIND" data-function-template="FIND(&quot;text&quot;, {cell})">FIND</button>
                <button type="button" role="menuitem" data-insert-function="REPLACE" data-function-template="REPLACE({cell}, 1, 0, &quot;text&quot;)">REPLACE</button>
              </div>
            </details>
          </nav>
        </div>
      </header>

      <section class="sheet-frame" aria-label="Spreadsheet grid">
        <table id="sheet" class="sheet"></table>
      </section>

      <footer class="statusbar">
        <span id="statusSheet">Unsaved sheet</span>
        <span id="statusCell">A1</span>
        <span id="statusValue"></span>
      </footer>
    </main>
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
